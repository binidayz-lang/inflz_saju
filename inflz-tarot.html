<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인플즈메리 타로</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0a0f; --gold:#c9a84c; --gold2:#f0d080;
  --cream:#f0e8d0; --text2:#c8b898; --text3:#6a5a40;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--cream);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(201,168,76,0.1) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 10% 80%,rgba(45,27,78,0.35) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 90% 80%,rgba(45,27,78,0.25) 0%,transparent 60%);}
.star{position:fixed;border-radius:50%;background:#fff;animation:tw var(--d) ease-in-out infinite;pointer-events:none;z-index:0;}
@keyframes tw{0%,100%{opacity:var(--o)}50%{opacity:calc(var(--o)*0.1)}}

.wrap{position:relative;z-index:1;max-width:500px;margin:0 auto;padding:40px 16px 80px;}

/* 헤더 */
.header{text-align:center;margin-bottom:28px;animation:fadeDown .8s ease both;}
.logo{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:8px;color:var(--gold);margin-bottom:14px;opacity:.8;}
h1{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--cream);line-height:1.35;margin-bottom:10px;text-shadow:0 0 60px rgba(201,168,76,0.3);}
.header-desc{font-size:13px;color:var(--text2);line-height:1.9;font-weight:300;}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.4),transparent);}
.divider span{color:var(--gold);font-size:14px;}

/* 단계 */
.dots{display:flex;justify-content:center;gap:8px;margin-bottom:28px;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.25);transition:all .4s;}
.dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(201,168,76,.5);}
.dot.done{background:rgba(201,168,76,.35);border-color:rgba(201,168,76,.35);}

.screen{display:none;}
.screen.on{display:block;animation:fadeUp .5s ease both;}

/* 질문 */
.q-title{text-align:center;margin-bottom:16px;}
.q-label{font-size:10px;letter-spacing:4px;color:var(--gold);font-weight:700;margin-bottom:8px;font-family:'Cormorant Garamond',serif;display:block;}
.q-text{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:var(--cream);line-height:1.5;}
.q-sub{font-size:12px;color:var(--text2);margin-top:8px;font-weight:300;}

/* 카드 펼치기 */
.spread-wrap{position:relative;height:210px;margin:20px 0 12px;display:flex;align-items:flex-end;justify-content:center;}

.spread-card{
  position:absolute;width:68px;height:112px;border-radius:8px;
  background:linear-gradient(145deg,#1e1240,#0d0820);
  border:1.5px solid rgba(201,168,76,0.28);
  cursor:pointer;transform-origin:center bottom;
  transition:transform .2s ease,box-shadow .2s ease,border-color .2s,opacity .3s;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.6);
}
.spread-card::before{
  content:'';position:absolute;inset:5px;border:1px solid rgba(201,168,76,0.12);border-radius:4px;
  background:repeating-linear-gradient(45deg,rgba(201,168,76,.03) 0,rgba(201,168,76,.03) 1px,transparent 1px,transparent 7px),
  repeating-linear-gradient(-45deg,rgba(201,168,76,.03) 0,rgba(201,168,76,.03) 1px,transparent 1px,transparent 7px);
}
.spread-card .sym{font-size:22px;position:relative;z-index:1;opacity:.6;}
.spread-card:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.3),0 8px 20px rgba(0,0,0,.6);z-index:50!important;}
.spread-card.picked{
  border-color:var(--gold2);
  box-shadow:0 0 40px rgba(201,168,76,.6),0 12px 30px rgba(0,0,0,.7);
  pointer-events:none;
}

.spread-hint{text-align:center;font-size:12px;color:var(--text3);letter-spacing:1px;margin-bottom:20px;animation:blink 2s ease-in-out infinite;transition:opacity .3s;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* 뽑은 카드 미리보기 */
.picked-preview{
  display:none;flex-direction:column;align-items:center;gap:12px;
  margin:16px 0 20px;
}
.picked-preview.on{display:flex;animation:fadeUp .5s ease both;}
.preview-img{
  width:90px;height:148px;border-radius:10px;overflow:hidden;
  border:1.5px solid rgba(201,168,76,.5);
  box-shadow:0 0 30px rgba(201,168,76,.2);
  animation:cardReveal .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardReveal{from{opacity:0;transform:rotateY(90deg)}to{opacity:1;transform:rotateY(0)}}
.preview-img img{width:100%;height:100%;object-fit:cover;display:block;}
.preview-name{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--cream);font-style:italic;text-align:center;}

.next-btn{
  width:100%;
  background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(201,168,76,0.08));
  border:1px solid rgba(201,168,76,0.35);border-radius:14px;padding:15px;
  color:var(--gold2);font-family:'Noto Serif KR',serif;
  font-size:15px;font-weight:700;letter-spacing:2px;
  cursor:pointer;transition:all .3s;
}
.next-btn:hover{background:rgba(201,168,76,0.2);transform:translateY(-2px);}

/* 최종 결과 */
.final-wrap{animation:fadeUp .7s ease both;}

.two-cards-row{display:flex;gap:20px;justify-content:center;margin-bottom:28px;}
.card-col{text-align:center;flex:1;max-width:140px;}
.col-label{font-size:9px;letter-spacing:3px;color:var(--gold);margin-bottom:8px;font-family:'Cormorant Garamond',serif;opacity:.8;display:block;line-height:1.6;}
.col-card{
  width:100%;aspect-ratio:2/3;border-radius:10px;overflow:hidden;
  border:1.5px solid rgba(201,168,76,.4);
  box-shadow:0 0 24px rgba(201,168,76,.15);
  margin-bottom:8px;
}
.col-card img{width:100%;height:100%;object-fit:cover;display:block;}
.col-name{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--cream);font-style:italic;}

.reading-box{
  background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.16);
  border-radius:16px;padding:20px 18px;margin-bottom:12px;
}
.rb-label{font-size:9px;letter-spacing:4px;color:var(--gold);margin-bottom:10px;font-family:'Cormorant Garamond',serif;font-weight:700;display:block;}
.rb-verdict{font-size:14px;font-weight:700;color:var(--gold2);margin-bottom:8px;font-family:'Noto Serif KR',serif;}
.rb-reading{font-size:13px;color:var(--text2);line-height:1.9;font-weight:300;}

.final-box{
  background:linear-gradient(135deg,rgba(201,168,76,0.12),rgba(45,27,78,0.3));
  border:1.5px solid rgba(201,168,76,0.28);border-radius:16px;
  padding:24px 20px;text-align:center;margin-bottom:20px;
}
.final-text{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700;color:var(--cream);line-height:1.8;margin-bottom:8px;}
.final-sub{font-size:10px;color:var(--gold);letter-spacing:3px;opacity:.7;font-family:'Cormorant Garamond',serif;}

.btn-row{display:flex;gap:10px;}
.btn-share{flex:1;background:transparent;border:1px solid rgba(201,168,76,0.3);border-radius:12px;padding:14px;color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;font-family:'Noto Sans KR',sans-serif;}
.btn-share:hover{background:rgba(201,168,76,0.08);}
.btn-apply{flex:2;background:linear-gradient(135deg,#c9a84c,#8b6914);border:none;border-radius:12px;padding:14px;color:#0c0a0f;font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .25s;}
.btn-apply:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.35);}
.btn-again{width:100%;background:transparent;border:none;padding:16px;color:var(--text3);font-size:12px;letter-spacing:2px;cursor:pointer;font-family:'Cormorant Garamond',serif;transition:color .25s;}
.btn-again:hover{color:var(--text2);}

.ptc{position:fixed;pointer-events:none;z-index:999;font-size:22px;animation:fly 2s ease-out forwards;}
@keyframes fly{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(-160px) rotate(180deg)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">✦ Inflz Mary ✦</div>
    <h1>온라인 사업<br>운명 타로</h1>
    <div class="divider"><span>✦</span></div>
    <p class="header-desc">두 장의 카드가 당신의 운명을 읽어드립니다</p>
  </div>

  <div class="dots">
    <div class="dot on" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
  </div>

  <!-- S1: 첫번째 카드 -->
  <div class="screen on" id="s1">
    <div class="q-title">
      <span class="q-label">✦ 첫 번째 카드</span>
      <div class="q-text">나는 온라인 사업을<br>할 수 있는 사람인가?</div>
      <div class="q-sub">마음이 가는 카드를 골라주세요</div>
    </div>
    <div class="spread-wrap" id="spread1"></div>
    <div class="spread-hint" id="hint1">✦ 카드를 터치하세요 ✦</div>
    <div class="picked-preview" id="preview1">
      <div class="preview-img"><img id="prevImg1" src="" alt=""></div>
      <div class="preview-name" id="prevName1"></div>
    </div>
    <button class="next-btn" id="nextBtn1" style="display:none;" onclick="goS2()">두 번째 카드 뽑으러 가기 →</button>
  </div>

  <!-- S2: 두번째 카드 -->
  <div class="screen" id="s2">
    <div class="q-title">
      <span class="q-label">✦ 두 번째 카드</span>
      <div class="q-text">인플즈메리 강사와<br>함께할 운명인가?</div>
      <div class="q-sub">마음이 가는 카드를 골라주세요</div>
    </div>
    <div class="spread-wrap" id="spread2"></div>
    <div class="spread-hint" id="hint2">✦ 카드를 터치하세요 ✦</div>
    <div class="picked-preview" id="preview2">
      <div class="preview-img"><img id="prevImg2" src="" alt=""></div>
      <div class="preview-name" id="prevName2"></div>
    </div>
    <button class="next-btn" id="nextBtn2" style="display:none;" onclick="goFinal()">✦ 나의 타로 리딩 확인하기 ✦</button>
  </div>

  <!-- S3: 최종 -->
  <div class="screen" id="s3">
    <div class="final-wrap">
      <div class="two-cards-row">
        <div class="card-col">
          <span class="col-label">첫 번째 카드<br>온라인 사업 적합도</span>
          <div class="col-card"><img id="finalImg1" src="" alt=""></div>
          <div class="col-name" id="finalName1"></div>
        </div>
        <div class="card-col">
          <span class="col-label">두 번째 카드<br>메리님과의 궁합</span>
          <div class="col-card"><img id="finalImg2" src="" alt=""></div>
          <div class="col-name" id="finalName2"></div>
        </div>
      </div>

      <div class="reading-box">
        <span class="rb-label">✦ 첫 번째 카드 리딩 — 온라인 사업 적합도</span>
        <div class="rb-verdict" id="v1"></div>
        <div class="rb-reading" id="r1"></div>
      </div>

      <div class="reading-box">
        <span class="rb-label">✦ 두 번째 카드 리딩 — 메리님과의 궁합</span>
        <div class="rb-verdict" id="v2"></div>
        <div class="rb-reading" id="r2"></div>
      </div>

      <div class="divider"><span>✦</span></div>

      <div class="final-box">
        <div class="final-text" id="finalText"></div>
        <div class="final-sub">✦ 인플즈메리의 타로 리딩 ✦</div>
      </div>

      <div class="btn-row">
        <button class="btn-share" onclick="share()">📤 공유하기</button>
        <button class="btn-apply" onclick="window.open('https://celebrity.place/marryz','_blank')">챌린지 시작하기 →</button>
      </div>
      <button class="btn-again" onclick="reset()">↩ 다시 뽑기</button>
    </div>
  </div>
</div>

<script>
for(let i=0;i<70;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*1.8+.3;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*5}s;--o:${.1+Math.random()*.45};animation-delay:${Math.random()*6}s;`;
  document.body.appendChild(s);
}

const CARDS=[
  {id:'ar00',name:'The Fool',kr:'바보',emoji:'🌟',biz:'충만한 가능성과 새로운 시작의 에너지가 넘칩니다. 두려움 없이 뛰어드는 용기야말로 온라인 사업의 첫 발걸음에 가장 필요한 자질입니다.',bizV:'✅ 지금이 바로 시작할 때',mary:'경계 없는 자유로운 에너지가 메리님의 열린 교육 방식과 완벽하게 공명합니다. 처음이라 더 좋은 시작이 됩니다.',maryV:'💜 최고의 궁합',final:'망설임이 가장 큰 적입니다. 타로는 이미 답을 알고 있어요 — 지금 시작하세요.'},
  {id:'ar01',name:'The Magician',kr:'마법사',emoji:'✨',biz:'당신 안에 온라인 사업에 필요한 모든 도구가 이미 갖춰져 있습니다. 배운 것을 즉시 현실로 만드는 실행력이 탁월합니다.',bizV:'✅ 타고난 실행력의 소유자',mary:'메리님의 체계적인 교육과 당신의 실행력이 만나면 시너지가 폭발합니다. 30일이 충분하고도 남습니다.',maryV:'💜 환상의 케미',final:'마법사는 행동하는 사람입니다. 메리님과 함께 당신 안의 마법을 현실로 꺼낼 시간입니다.'},
  {id:'ar02',name:'The High Priestess',kr:'여사제',emoji:'🌙',biz:'깊은 직관과 통찰력이 시장을 꿰뚫어 보는 능력으로 이어집니다. 온라인 사업의 전략가형 기질을 타고났습니다.',bizV:'✅ 직관이 곧 전략',mary:'여사제의 지혜로운 에너지는 메리님의 깊이 있는 교육과 완벽하게 맞닿아 있습니다.',maryV:'💜 깊이가 통하는 궁합',final:'당신의 직관은 이미 알고 있습니다. 메리님과 함께라면 그 직관이 수익으로 증명됩니다.'},
  {id:'ar03',name:'The Empress',kr:'여황제',emoji:'🌸',biz:'풍요롭고 창의적인 에너지가 콘텐츠 기획에서 빛납니다. 사람들을 끌어당기는 따뜻한 매력이 팔로워를 고객으로 만드는 힘입니다.',bizV:'✅ 풍요를 끌어당기는 기질',mary:'여황제의 넉넉한 에너지는 메리님의 따뜻한 교육 철학과 완벽히 어울립니다.',maryV:'💜 풍요로운 시너지',final:'여황제는 결실을 맺는 카드입니다. 메리님과 함께하는 30일이 풍요의 씨앗이 됩니다.'},
  {id:'ar04',name:'The Emperor',kr:'황제',emoji:'👑',biz:'강한 리더십과 체계적 사고가 온라인 사업의 기반을 탄탄하게 구축합니다. 한 번 세운 목표는 반드시 이루는 기질입니다.',bizV:'✅ 탄탄한 사업 기반의 소유자',mary:'황제의 체계적 기질은 메리님의 구조화된 교육과 최상의 궁합입니다.',maryV:'💜 완벽한 시스템 궁합',final:'황제는 스스로 왕국을 만드는 사람입니다. 메리님의 교육이 그 설계도가 됩니다.'},
  {id:'ar06',name:'The Lovers',kr:'연인',emoji:'💫',biz:'진심에서 우러나는 소통 능력이 강력한 팬덤을 만드는 기질입니다. 사람들이 당신을 좋아하게 만드는 매력이 최고의 마케팅입니다.',bizV:'✅ 사람을 끌어당기는 매력',mary:'연인 카드는 완벽한 파트너십을 의미합니다. 메리님과의 만남이 가장 중요한 선택이 됩니다.',maryV:'💜 완벽한 파트너십',final:'연인 카드가 말합니다 — 이 선택을 하세요. 메리님과 함께하는 30일이 전환점입니다.'},
  {id:'ar07',name:'The Chariot',kr:'전차',emoji:'⚡',biz:'강한 의지와 추진력이 빠른 성과를 만드는 기질입니다. 장애물을 두려워하지 않고 돌파해나가는 능력이 강점입니다.',bizV:'✅ 돌파력의 소유자',mary:'전차의 전진 에너지는 메리님의 실전 중심 교육과 찰떡입니다. 배우면 바로 달리는 유형입니다.',maryV:'💜 함께하면 가장 빠릅니다',final:'전차는 멈추지 않습니다. 메리님과 달리기 시작하면 30일 후 완전히 다른 곳에 서 있습니다.'},
  {id:'ar08',name:'Strength',kr:'힘',emoji:'🦁',biz:'내면의 강인함과 인내심이 장기전에서 빛나는 기질입니다. 포기하지 않는 끈기가 결국 성과를 만들어냅니다.',bizV:'✅ 흔들리지 않는 내면의 힘',mary:'힘 카드는 온화하지만 강한 에너지를 상징합니다. 메리님의 높은 기준의 교육과 어울리는 기질입니다.',maryV:'💜 서로를 성장시키는 궁합',final:'당신 안에 이미 충분한 힘이 있습니다. 메리님과 함께라면 그 힘이 수익으로 증명됩니다.'},
  {id:'ar10',name:'Wheel of Fortune',kr:'운명의 수레바퀴',emoji:'🎡',biz:'운명의 전환점이 바로 지금 찾아왔습니다. 이 시기에 시작하는 온라인 사업은 흐름을 타고 가속도가 붙는 최고의 타이밍입니다.',bizV:'✅ 지금이 최고의 타이밍',mary:'수레바퀴가 돌아 메리님과의 만남을 이끌었습니다. 이 인연은 운명의 선물입니다.',maryV:'💜 운명이 이끈 만남',final:'수레바퀴는 이미 돌기 시작했습니다. 8기가 당신의 차례입니다.'},
  {id:'ar17',name:'The Star',kr:'별',emoji:'🌟',biz:'희망과 영감의 에너지가 빛나는 존재감으로 이어집니다. 어두운 시장에서 당신만의 별빛으로 팔로워에게 영감을 주는 기질입니다.',bizV:'✅ 빛나는 존재감의 소유자',mary:'별 카드는 가장 밝은 희망을 상징합니다. 메리님과의 만남이 당신의 여정에서 가장 밝은 별이 됩니다.',maryV:'💜 서로를 빛나게 하는 궁합',final:'별은 어둠 속에서 가장 빛납니다. 메리님과 함께라면 수익이라는 형태로 반짝이게 됩니다.'},
  {id:'ar19',name:'The Sun',kr:'태양',emoji:'☀️',biz:'태양의 밝고 뜨거운 에너지가 자연스러운 주목을 끌어당깁니다. 긍정적 에너지와 성공 기질이 타고나 시작하는 모든 것에 햇빛이 따릅니다.',bizV:'✅ 성공이 예약된 기질',mary:'태양은 타로에서 가장 강력한 성공 카드입니다. 메리님과 함께하는 것이 성공에 날개를 달아줍니다.',maryV:'💜 최고의 성공 궁합',final:'태양이 뜨면 모두가 봅니다. 30일을 달리면 당신의 성공을 모두가 보게 됩니다.'},
  {id:'ar21',name:'The World',kr:'세계',emoji:'🌍',biz:'완성과 성취의 에너지가 넘칩니다. 시작하면 반드시 완성하는 기질 덕분에 30일 챌린지를 가장 완벽하게 마무리하는 유형입니다.',bizV:'✅ 완성의 기운을 타고남',mary:'세계 카드는 타로의 완성입니다. 메리님과의 여정이 온라인 사업 완성으로 이어지는 운명입니다.',maryV:'💜 완성을 향한 완벽한 궁합',final:'세계가 당신을 기다립니다. 메리님과 함께 30일을 완주하면 당신만의 온라인 세계가 펼쳐집니다.'},
];

function getImg(id){return`https://www.sacred-texts.com/tarot/pkt/img/${id}.jpg`;}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

let p1=null, p2=null;

function buildSpread(wrapId, onPick){
  const wrap=document.getElementById(wrapId);
  wrap.innerHTML='';
  const cards=shuffle(CARDS).slice(0,11);
  const totalAngle=78, startAngle=-totalAngle/2, step=totalAngle/10;
  const radius=280;
  cards.forEach((card,i)=>{
    const angle=startAngle+step*i;
    const rad=angle*Math.PI/180;
    const x=Math.sin(rad)*radius*0.5;
    const y=-Math.cos(rad)*radius+radius-30;
    const el=document.createElement('div');
    el.className='spread-card';
    el.innerHTML=`<div class="sym">🔮</div>`;
    el.style.cssText=`left:calc(50% - 34px + ${x}px);bottom:${Math.max(0,-y)}px;transform:rotate(${angle}deg);z-index:${i};`;
    el.addEventListener('click',()=>onPick(card,el));
    wrap.appendChild(el);
  });
}

function pick1(card, el){
  if(p1) return;
  p1=card;
  el.classList.add('picked');
  el.style.transform='rotate(0deg) translateY(-16px)';
  document.querySelectorAll('#spread1 .spread-card').forEach(c=>{if(c!==el){c.style.opacity='0.15';c.style.pointerEvents='none';}});
  document.getElementById('hint1').style.opacity='0';
  setTimeout(()=>{
    document.getElementById('prevImg1').src=getImg(card.id);
    document.getElementById('prevName1').textContent=`${card.emoji} ${card.kr}`;
    document.getElementById('preview1').className='picked-preview on';
    document.getElementById('nextBtn1').style.display='block';
    document.getElementById('nextBtn1').style.animation='fadeUp .4s ease both';
    for(let i=0;i<6;i++) setTimeout(particle,i*100);
  },500);
}

function pick2(card, el){
  if(p2) return;
  p2=card;
  el.classList.add('picked');
  el.style.transform='rotate(0deg) translateY(-16px)';
  document.querySelectorAll('#spread2 .spread-card').forEach(c=>{if(c!==el){c.style.opacity='0.15';c.style.pointerEvents='none';}});
  document.getElementById('hint2').style.opacity='0';
  setTimeout(()=>{
    document.getElementById('prevImg2').src=getImg(card.id);
    document.getElementById('prevName2').textContent=`${card.emoji} ${card.kr}`;
    document.getElementById('preview2').className='picked-preview on';
    document.getElementById('nextBtn2').style.display='block';
    document.getElementById('nextBtn2').style.animation='fadeUp .4s ease both';
    for(let i=0;i<6;i++) setTimeout(particle,i*100);
  },500);
}

function goS2(){
  document.getElementById('s1').className='screen';
  setTimeout(()=>{
    document.getElementById('s2').className='screen on';
    updateDots(2);
    buildSpread('spread2',pick2);
  },100);
}

function goFinal(){
  document.getElementById('s2').className='screen';
  setTimeout(()=>{
    document.getElementById('s3').className='screen on';
    updateDots(3);
    document.getElementById('finalImg1').src=getImg(p1.id);
    document.getElementById('finalImg2').src=getImg(p2.id);
    document.getElementById('finalName1').textContent=`${p1.emoji} ${p1.kr}`;
    document.getElementById('finalName2').textContent=`${p2.emoji} ${p2.kr}`;
    document.getElementById('v1').textContent=p1.bizV;
    document.getElementById('r1').textContent=p1.biz;
    document.getElementById('v2').textContent=p2.maryV;
    document.getElementById('r2').textContent=p2.mary;
    document.getElementById('finalText').textContent=p1.final;
    for(let i=0;i<18;i++) setTimeout(particle,i*110);
  },100);
}

function updateDots(active){
  for(let i=1;i<=3;i++){
    const d=document.getElementById(`dot${i}`);
    if(i<active)d.className='dot done';
    else if(i===active)d.className='dot on';
    else d.className='dot';
  }
}

function particle(){
  const p=document.createElement('div');p.className='ptc';
  p.textContent=['✨','⭐','🌟','💫','🔮','🌙'][Math.floor(Math.random()*6)];
  p.style.cssText=`left:${10+Math.random()*80}%;bottom:20%;animation-delay:${Math.random()*.4}s;`;
  document.body.appendChild(p);setTimeout(()=>p.remove(),2200);
}

function share(){
  const txt=`🔮 인플즈메리 타로 리딩\n\n${p1.kr} ${p1.bizV}\n${p2.kr} ${p2.maryV}\n\n${p1.final}\n\n너도 해봐! 👉 https://m.site.naver.com/273Ha`;
  if(navigator.share)navigator.share({title:'인플즈 타로',text:txt});
  else if(navigator.clipboard){navigator.clipboard.writeText(txt);alert('복사됐어요! ✨');}
}

function reset(){
  p1=null;p2=null;
  document.getElementById('s3').className='screen';
  document.getElementById('preview1').className='picked-preview';
  document.getElementById('preview2').className='picked-preview';
  document.getElementById('nextBtn1').style.display='none';
  document.getElementById('nextBtn2').style.display='none';
  document.getElementById('hint1').style.opacity='1';
  document.getElementById('hint2').style.opacity='1';
  setTimeout(()=>{
    document.getElementById('s1').className='screen on';
    updateDots(1);
    buildSpread('spread1',pick1);
  },100);
}

buildSpread('spread1',pick1);
</script>
