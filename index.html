<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인플즈 사주 - 나의 온라인 사업 기질 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf8f0;
    --gold: #b8860b;
    --gold-btn: #c9a020;
    --gold-light: #f5e6b0;
    --purple: #6b3fa0;
    --purple-light: #ede4f8;
    --text: #1a1208;
    --text2: #4a3f2a;
    --text3: #8a7a5a;
    --border: #e0d0a0;
    --card: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background: radial-gradient(ellipse 70% 40% at 0% 30%, rgba(180,140,40,0.08) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 100% 70%, rgba(107,63,160,0.06) 0%, transparent 60%);
  }
  .wrap { position:relative; z-index:1; max-width:460px; margin:0 auto; padding:48px 20px 80px; }
  .header { text-align:center; margin-bottom:36px; animation:fadeDown .7s ease both; }
  .badge { display:inline-block; background:var(--gold-light); border:1px solid var(--border); border-radius:20px; padding:5px 18px; font-size:11px; letter-spacing:4px; color:var(--gold); font-weight:700; margin-bottom:20px; }
  h1 { font-family:'Noto Serif KR',serif; font-size:30px; font-weight:700; line-height:1.45; color:var(--text); margin-bottom:14px; }
  h1 em { color:var(--purple); font-style:normal; }
  .header-desc { font-size:14px; color:var(--text2); line-height:1.9; font-weight:400; }
  .divider { display:flex; align-items:center; gap:10px; margin:22px 0; }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); }
  .divider span { color:var(--gold); font-size:14px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:32px 24px; box-shadow:0 4px 24px rgba(0,0,0,0.06); animation:fadeUp .7s .15s ease both; }
  .field-label { font-size:11px; letter-spacing:3px; color:var(--gold); font-weight:700; margin-bottom:10px; display:block; }
  .sel-row { display:flex; gap:8px; margin-bottom:20px; }
  .sel-wrap { flex:1; position:relative; }
  .sel-wrap::after { content:'▾'; position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--gold); font-size:12px; pointer-events:none; }
  select { width:100%; appearance:none; -webkit-appearance:none; background:#fafaf5; border:1.5px solid var(--border); border-radius:12px; padding:13px 32px 13px 14px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:600; outline:none; cursor:pointer; transition:border-color .25s,box-shadow .25s; }
  select:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(107,63,160,0.1); }
  select option { background:#fff; color:var(--text); font-size:14px; }
  .gender-row { display:flex; gap:8px; margin-bottom:28px; }
  .g-btn { flex:1; background:#fafaf5; border:1.5px solid var(--border); border-radius:12px; padding:13px; color:var(--text2); font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:all .25s; }
  .g-btn.on { background:var(--purple-light); border-color:var(--purple); color:var(--purple); font-weight:700; }
  .cta { width:100%; background:linear-gradient(135deg,#7c4dcc 0%,#5a2ea0 100%); border:none; border-radius:14px; padding:17px; color:#fff; font-family:'Noto Serif KR',serif; font-size:16px; font-weight:700; letter-spacing:2px; cursor:pointer; transition:transform .25s,box-shadow .25s; }
  .cta:hover { transform:translateY(-2px); box-shadow:0 10px 32px rgba(107,63,160,.35); }
  .loading { display:none; text-align:center; padding:56px 0; }
  .loading.on { display:block; animation:fadeUp .5s ease both; }
  .orb { width:88px; height:88px; border-radius:50%; margin:0 auto 28px; background:radial-gradient(circle at 35% 35%,rgba(245,200,66,.8),rgba(107,63,160,.6) 50%,rgba(107,63,160,.9)); box-shadow:0 0 40px rgba(107,63,160,.3),inset 0 0 20px rgba(245,200,66,.2); animation:glow 2s ease-in-out infinite; }
  @keyframes glow { 0%,100%{box-shadow:0 0 40px rgba(107,63,160,.3),inset 0 0 20px rgba(245,200,66,.2)} 50%{box-shadow:0 0 70px rgba(107,63,160,.5),inset 0 0 35px rgba(245,200,66,.35)} }
  .loading-title { font-family:'Noto Serif KR',serif; font-size:17px; color:var(--purple); font-weight:700; letter-spacing:2px; margin-bottom:24px; animation:blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .step-list { font-size:14px; color:var(--text2); line-height:2.4; font-weight:500; }
  .step-list div { animation:fadeUp .4s ease both; }
  .result { display:none; }
  .result.on { display:block; animation:fadeUp .7s ease both; }
  .res-top { text-align:center; margin-bottom:28px; }
  .zodiac-big { font-size:64px; display:block; margin-bottom:12px; animation:float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .res-name { font-family:'Noto Serif KR',serif; font-size:22px; font-weight:700; color:var(--text); margin-bottom:5px; }
  .res-sub { font-size:12px; color:var(--text3); letter-spacing:2px; font-weight:500; }
  .gauge-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px 20px; margin-bottom:12px; box-shadow:0 2px 12px rgba(0,0,0,0.04); }
  .gauge-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; }
  .gauge-name { font-size:14px; color:var(--text2); font-weight:600; }
  .gauge-score { font-family:'Noto Serif KR',serif; font-size:28px; font-weight:700; color:var(--purple); }
  .bar-bg { height:8px; background:var(--gold-light); border-radius:4px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--purple),var(--gold-btn)); width:0; transition:width 1.6s cubic-bezier(.16,1,.3,1); }
  .analysis-card { background:var(--purple-light); border:1px solid rgba(107,63,160,0.18); border-radius:18px; padding:24px 20px; margin-bottom:12px; }
  .sec-label { font-size:10px; letter-spacing:4px; color:var(--purple); font-weight:700; margin-bottom:14px; }
  #analysisText { font-family:'Noto Serif KR',serif; font-size:15px; line-height:2.1; color:var(--text); font-weight:400; }
  .conclusion-card { background:linear-gradient(135deg,var(--gold-light),var(--purple-light)); border:1.5px solid var(--border); border-radius:18px; padding:26px 20px; text-align:center; margin-bottom:20px; box-shadow:0 4px 20px rgba(107,63,160,0.1); }
  #conclusionText { font-family:'Noto Serif KR',serif; font-size:17px; font-weight:700; color:var(--text); line-height:1.8; margin-bottom:10px; }
  .conclusion-sub { font-size:11px; color:var(--gold); letter-spacing:3px; font-weight:700; }
  .btn-row { display:flex; gap:10px; }
  .btn-share { flex:1; background:#fff; border:1.5px solid var(--border); border-radius:12px; padding:14px; color:var(--text2); font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all .25s; }
  .btn-share:hover { background:var(--gold-light); border-color:var(--gold); }
  .btn-apply { flex:2; background:linear-gradient(135deg,#7c4dcc,#5a2ea0); border:none; border-radius:12px; padding:14px; color:#fff; font-family:'Noto Serif KR',serif; font-size:15px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all .25s; }
  .btn-apply:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(107,63,160,.4); }
  .btn-again { width:100%; background:transparent; border:none; padding:18px; color:var(--text3); font-size:13px; letter-spacing:2px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; font-weight:500; transition:color .25s; margin-top:4px; }
  .btn-again:hover { color:var(--text2); }
  .ptc { position:fixed; pointer-events:none; z-index:999; font-size:22px; animation:fly 2.2s ease-out forwards; }
  @keyframes fly { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-180px) scale(.2)} }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-22px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="badge">✦ 인플즈메리 ✦</div>
    <h1>나의 온라인 사업<br><em>기질 사주 분석</em></h1>
    <div class="divider"><span>☽</span></div>
    <p class="header-desc">생년월일로 알아보는<br>나의 온라인 사업 적성과 메리님과의 궁합</p>
  </div>

  <div class="card" id="formCard">
    <span class="field-label">✦ 태어난 해</span>
    <div class="sel-row">
      <div class="sel-wrap" style="flex:1;">
        <select id="year"><option value="">년도를 선택하세요</option></select>
      </div>
    </div>
    <span class="field-label">✦ 태어난 월 / 일</span>
    <div class="sel-row">
      <div class="sel-wrap"><select id="month"><option value="">월 선택</option></select></div>
      <div class="sel-wrap"><select id="day"><option value="">일 선택</option></select></div>
    </div>
    <span class="field-label" style="margin-top:4px;">✦ 성별</span>
    <div class="gender-row">
      <button class="g-btn on" id="fBtn" onclick="setGender('여')">여성 ♀</button>
      <button class="g-btn" id="mBtn" onclick="setGender('남')">남성 ♂</button>
    </div>
    <button class="cta" onclick="run()">✦ 나의 기질 분석하기 ✦</button>
  </div>

  <div class="loading" id="loading">
    <div class="orb"></div>
    <div class="loading-title">기운을 읽는 중...</div>
    <div class="step-list" id="steps"></div>
  </div>

  <div class="result" id="result">
    <div class="res-top">
      <span class="zodiac-big" id="zodiacEmoji">🔮</span>
      <div class="res-name" id="resName"></div>
      <div class="res-sub">온라인 사업 기질 분석 완료</div>
    </div>
    <div class="divider"><span>✦</span></div>
    <div class="gauge-card">
      <div class="gauge-row"><span class="gauge-name">메리님과의 궁합</span><span class="gauge-score" id="mScore">0%</span></div>
      <div class="bar-bg"><div class="bar-fill" id="mBar"></div></div>
    </div>
    <div class="gauge-card">
      <div class="gauge-row"><span class="gauge-name">인플즈 사업 적합도</span><span class="gauge-score" id="iScore">0%</span></div>
      <div class="bar-bg"><div class="bar-fill" id="iBar"></div></div>
    </div>
    <div class="divider"><span>☽</span></div>
    <div class="analysis-card">
      <div class="sec-label">✦ 기질 분석</div>
      <div id="analysisText"></div>
    </div>
    <div class="conclusion-card">
      <div id="conclusionText"></div>
      <div class="conclusion-sub">✦ 인플즈메리의 사주 분석 ✦</div>
    </div>
    <div class="btn-row">
      <button class="btn-share" onclick="share()">📤 공유하기</button>
      <button class="btn-apply" onclick="window.open('https://celebrity.place/marryz','_blank')">8기 신청하기 →</button>
    </div>
    <button class="btn-again" onclick="reset()">↩ 다시 분석하기</button>
  </div>
</div>

<script>
  // 드롭다운 채우기
  const ySel=document.getElementById('year');
  for(let y=2005;y>=1955;y--){const o=document.createElement('option');o.value=y;o.textContent=y+'년';ySel.appendChild(o);}
  const mSel=document.getElementById('month');
  for(let m=1;m<=12;m++){const o=document.createElement('option');o.value=m;o.textContent=m+'월';mSel.appendChild(o);}
  const dSel=document.getElementById('day');
  for(let d=1;d<=31;d++){const o=document.createElement('option');o.value=d;o.textContent=d+'일';dSel.appendChild(o);}

  let gender='여';
  function setGender(g){
    gender=g;
    document.getElementById('fBtn').className=g==='여'?'g-btn on':'g-btn';
    document.getElementById('mBtn').className=g==='남'?'g-btn on':'g-btn';
  }

  const ANIMALS=['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
  const EMOJIS={'쥐':'🐭','소':'🐮','호랑이':'🐯','토끼':'🐰','용':'🐲','뱀':'🐍','말':'🐴','양':'🐑','원숭이':'🐵','닭':'🐔','개':'🐶','돼지':'🐷'};
  const getAnimal=y=>ANIMALS[(y-1900)%12];

  // 띠별 기질 분석 데이터
  const TRAITS = {
    '쥐': {
      키워드: ['빠른 판단력', '재치', '정보 수집력'],
      분석: [
        '쥐띠는 예리한 감각과 빠른 상황 판단력이 타고난 기질입니다. 남들이 지나치는 정보도 놓치지 않는 눈이 있어 온라인 트렌드를 가장 먼저 포착하는 능력이 있습니다. 부지런하고 꼼꼼한 성격은 공구중개와 브랜드몰 운영에서 빛을 발하며, 작은 것 하나도 허투루 넘기지 않는 성실함이 수익으로 이어집니다.',
        '쥐띠 특유의 영리함과 적응력은 온라인 사업의 가장 강력한 무기입니다. 새로운 환경에 빠르게 적응하는 능력 덕분에 플랫폼이 바뀌어도, 시장이 변해도 언제나 살아남는 유형입니다. 사람을 끌어들이는 말솜씨와 친화력은 팔로워를 고객으로 전환하는 데 탁월한 강점이 됩니다.'
      ],
      결론: [
        '메리님과 함께라면 이 예리한 감각이 실제 월수익으로 정확히 환산됩니다. 30일 안에 첫 수익 구조를 세팅하기에 가장 유리한 기질을 타고났습니다.',
        '인플즈와 함께라면 쥐띠의 정보 수집력이 무기가 됩니다. 남들보다 한 발 앞선 감각으로 30일 만에 온라인 사업의 기틀을 완성할 수 있습니다.'
      ]
    },
    '소': {
      분석: [
        '소띠는 한 번 마음먹으면 반드시 해내는 강인한 지속력의 기질입니다. 화려하지 않아도 묵묵히 쌓아가는 힘이 있어 온라인 사업에서 장기적인 수익 구조를 만드는 데 최적화된 유형입니다. 신뢰를 기반으로 한 영업력은 한 명의 고객을 열 명의 단골로 만드는 능력으로 이어집니다.',
        '소띠의 성실함과 책임감은 온라인 사업에서 가장 귀한 덕목입니다. 쉽게 포기하지 않는 기질 덕분에 초반의 시행착오도 끝까지 돌파해내는 저력이 있습니다. 고객의 신뢰를 차곡차곡 쌓는 능력은 브랜드를 단단하게 만드는 힘입니다.'
      ],
      결론: [
        '메리님과 함께라면 소띠의 끈기는 30일 챌린지를 가장 완벽하게 완주하는 원동력이 됩니다. 시작한 사람 중 가장 멀리 가는 유형입니다.',

      ]
    },
    '호랑이': {
      분석: [
        '호랑이띠는 타고난 리더십과 강렬한 존재감이 온라인에서 자연스러운 브랜딩으로 이어지는 기질입니다. 강단 있는 추진력과 남다른 열정은 팔로워들에게 자연스럽게 신뢰감을 주고, 첫인상부터 "이 사람은 다르다"는 인식을 심어줍니다. 도전을 두려워하지 않는 용기가 온라인 사업의 가장 큰 자산입니다.',
        '호랑이띠는 불꽃같은 열정과 대담한 실행력이 온라인 사업에서 빛나는 유형입니다. 한 번 결심하면 거침없이 달려드는 기질 덕분에 초반 셋업 속도가 타 기질보다 월등히 빠릅니다. 이런 속도감은 30일이라는 짧은 시간 안에 수익 구조를 완성하는 핵심 동력이 됩니다.'
      ],
      결론: [
        '메리님과 함께라면 호랑이띠의 뜨거운 실행력이 30일 만에 가시적인 수익으로 연결됩니다. 시작하는 순간 이미 반은 성공한 기질입니다.',
        '인플즈와 함께라면 호랑이띠의 강렬한 존재감이 자연스러운 개인 브랜딩이 됩니다. 콘텐츠 하나로 수천 명을 움직이는 사람이 될 수 있습니다.'
      ]
    },
    '토끼': {
      분석: [
        '토끼띠는 섬세한 공감 능력과 따뜻한 소통력이 온라인 팬덤 형성에 탁월한 기질입니다. 상대의 마음을 헤아리는 능력이 뛰어나 고객이 "이 사람은 나를 알아준다"고 느끼게 만드는 희귀한 강점이 있습니다. 콘텐츠에 자연스럽게 녹아드는 진심은 팔로워를 충성 고객으로 전환하는 가장 강력한 도구입니다.',
        '토끼띠의 온화하고 배려 깊은 기질은 온라인에서 인간적인 신뢰를 쌓는 데 천하제일의 능력입니다. 무리하지 않고 꾸준히 나아가는 페이스 조절 능력은 장기전인 온라인 사업에서 지치지 않고 성장하는 비결이 됩니다. 미적 감각도 뛰어나 피드와 콘텐츠 퀄리티가 자연스럽게 높습니다.'
      ],

  const SEASON_BONUS = {
    봄: '봄 기운을 타고난 분으로, 새로운 시작에 있어 누구보다 강한 생명력을 지녔습니다.',

    가을: '가을의 풍성한 결실을 상징하는 기질로, 시작한 일을 반드시 수확으로 마무리하는 완성력이 있습니다.',
    겨울: '겨울의 고요함 속에 깊은 내공을 품은 기질로, 남들이 포기하는 순간 더욱 강해지는 저력이 있습니다.'
  };

  function getSeason(m) {
    if(m>=3&&m<=5) return '봄';
    if(m>=6&&m<=8) return '여름';
    if(m>=9&&m<=11) return '가을';
    return '겨울';
  }

  async function run(){
    const y=+document.getElementById('year').value;
    const m=+document.getElementById('month').value;
    const d=+document.getElementById('day').value;
    if(!y||!m||!d){alert('생년월일을 모두 선택해주세요 🙏');return;}

    document.getElementById('formCard').style.display='none';
    const lo=document.getElementById('loading');
    lo.className='loading on';

    const msgs=['생년월일 기운 분석 중...','오행과 천간 대조 중...','메리님 기질과 비교 중...','인플즈 적성 계산 중...','최종 운세 정리 중...'];
    const stepsEl=document.getElementById('steps');
    for(let i=0;i<msgs.length;i++){await wait(700);stepsEl.innerHTML+=`<div>✦ ${msgs[i]}</div>`;}

    const animal=getAnimal(y);
    const mPct=85+((m*d)%13);
    const iPct=88+((y+m)%11);
    const season=getSeason(m);

    const trait=TRAITS[animal];
    const anaIdx=(d%2===0)?0:1;
    const conIdx=(m%2===0)?0:1;

    const seasonBonus=SEASON_BONUS[season];
    const baseAnalysis=trait.분석[anaIdx];
    const analysis=baseAnalysis+' '+seasonBonus;
    const conclusion=trait.결론[conIdx];

    lo.className='loading';
    document.getElementById('zodiacEmoji').textContent=EMOJIS[animal]||'🔮';
    document.getElementById('resName').textContent=`${y}년생 ${animal}띠 ${gender}성`;
    document.getElementById('analysisText').textContent=analysis;
    document.getElementById('conclusionText').textContent=conclusion;
    document.getElementById('mScore').textContent=mPct+'%';
    document.getElementById('iScore').textContent=iPct+'%';

    document.getElementById('result').className='result on';
    setTimeout(()=>{
      document.getElementById('mBar').style.width=mPct+'%';
      document.getElementById('iBar').style.width=iPct+'%';
    },300);

    for(let i=0;i<14;i++) setTimeout(particle,i*130);
  }

  const wait=ms=>new Promise(r=>setTimeout(r,ms));

  function particle(){
    const p=document.createElement('div');p.className='ptc';
    p.textContent=['✨','⭐','🌟','💫','✦'][Math.floor(Math.random()*5)];
    p.style.cssText=`left:${15+Math.random()*70}%;bottom:25%;animation-delay:${Math.random()*.4}s;`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),2500);
  }

  function share(){
    const name=document.getElementById('resName').textContent;
    const ms=document.getElementById('mScore').textContent;
    const is=document.getElementById('iScore').textContent;
    const txt=`✦ 인플즈 사주 분석 결과 ✦\n${name}\n메리님 궁합 ${ms} | 인플즈 적합도 ${is}\n\n나도 해봐! 👉 marryz.imweb.me`;
    if(navigator.share)navigator.share({title:'인플즈 사주 분석',text:txt});
    else if(navigator.clipboard){navigator.clipboard.writeText(txt);alert('복사됐어요! 스토리에 올려보세요 ✨');}
  }

  function reset(){
    document.getElementById('result').className='result';
    document.getElementById('formCard').style.display='block';
    document.getElementById('year').value='';
    document.getElementById('month').value='';
    document.getElementById('day').value='';
    document.getElementById('steps').innerHTML='';
    document.getElementById('mBar').style.width='0';
    document.getElementById('iBar').style.width='0';
  }
